openai:
  model: gpt-4o-mini
  temperature: 0.8
  retries: 3
  items_per_world: 240
  request_batch_size: 40
  max_concurrency: 4
  allow_local_fallback: false
  min_real_row_fraction: 0.9
  # Number of phrasing styles the prompt asks for per target coordinate.
  # 4 = plain + ellipsis + multi_clause + sibling_confuser.
  phrasings_per_target: 4
  # Optional: point at a directory of real-world GraphQL SDLs (or
  # introspection JSONs). They are ingested as additional worlds and
  # default to the "test" split so transfer to live schemas is measured.
  real_schemas_dir: "schemas/real"
  budget_caps:
    max_requests: 20000
    max_tokens: 15000000

worlds:
  world_count: 60
  min_types: 20
  max_types: 36

dataset:
  target_train_min: 200000
  target_train_max: 500000
  # 0.97 on the light hash embedder keeps templated paraphrases while
  # collapsing only true duplicates. 0.92 destroyed ~90% of rows.
  semantic_dedupe_threshold: 0.97
  # World-level leakage threshold. Worlds where > 40% of queries mention
  # non-trivial canonical schema terms are dropped. strict_leakage_filter
  # does the per-row stemmed check on val/test.
  leakage_threshold: 0.4
  # Floor for seed-row quality_score. 0.7 = OpenAI-sourced rows only.
  min_quality_score: 0.7

eval:
  benchmark_suites:
    - realism_eval
    - adversarial_eval
    - compositional_eval
