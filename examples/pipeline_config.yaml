openai:
  model: gpt-4o-mini
  temperature: 0.8
  retries: 3
  items_per_world: 240
  budget_caps:
    max_requests: 20000
    max_tokens: 15000000

worlds:
  world_count: 60
  min_types: 20
  max_types: 36

dataset:
  target_train_min: 200000
  target_train_max: 500000
  semantic_dedupe_threshold: 0.92
  leakage_threshold: 0.02

eval:
  benchmark_suites:
    - realism_eval
    - adversarial_eval
    - compositional_eval
