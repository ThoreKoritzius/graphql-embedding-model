openai:
  model: gpt-4o-mini
  temperature: 0.7
  retries: 3
  items_per_type: 24
  budget_caps:
    max_requests: 10000
    max_tokens: 8000000

dataset:
  train_ratio: 0.8
  val_ratio: 0.1
  target_train_min: 20000
  target_train_max: 50000

eval:
  benchmark_suites:
    - synthetic_holdout
    - realism_eval
    - adversarial_eval
